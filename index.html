<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض الفيديو</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <!-- تم تحويل رابط Google Drive إلى رابط مباشر لتشغيله تلقائياً وبدون مشاكل -->
    <video id="myVideo" autoplay playsinline controls>
        <source src="https://docs.google.com/uc?export=download&id=13qghr6t1HyoconOI3okBoyJPEOw7IwnX" type="video/mp4">
        متصفحك لا يدعم تشغيل الفيديو.
    </video>

    <script>
        window.addEventListener('load', () => {
            const video = document.getElementById('myVideo');
            
            // تشغيل صامت تلقائياً لضمان تجاوب المتصفحات
            video.muted = true; 
            video.play().catch(error => {
                console.log("التشغيل التلقائي بحاجة لتفاعل المستخدم.");
            });

            // إعادة الصوت بمجرد لمس الشاشة
            document.body.addEventListener('click', () => {
                video.muted = false;
                video.play();
            }, { once: true });
        });
    </script>

</body>
</html>
