<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Congratulations 🎓</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-deep: #1a3a2a;
      --green-mid:  #204d35;
      --green-glow: #2e7d52;
      --gold:       #c9a84c;
      --gold-light: #e8c96e;
      --crystal:    rgba(255,255,255,0.07);
      --crystal-border: rgba(255,255,255,0.13);
      --text-main:  #f0ede4;
      --text-muted: #a89d80;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'Inter', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      background: var(--green-deep);
      color: var(--text-main);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, #2e5e3e55 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, #c9a84c22 0%, transparent 60%),
        linear-gradient(160deg, #12271a 0%, #1a3a2a 40%, #1e2e20 100%);
      z-index: 0;
      pointer-events: none;
    }

    #heart-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(2rem, 6vw, 5rem) clamp(1rem, 4vw, 3rem);
    }

    .card {
      background: var(--crystal);
      border: 1px solid var(--crystal-border);
      border-radius: 24px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: clamp(2rem, 5vw, 4rem) clamp(1.5rem, 5vw, 4rem);
      max-width: 760px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.08),
        0 8px 32px rgba(0,0,0,0.4),
        0 2px 8px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.06);
      margin-bottom: 3rem;
    }

    .card-label {
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.2rem;
      opacity: 0.85;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 6vw, 3.8rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--text-main);
      margin-bottom: 0.6rem;
    }

    .card-title span {
      color: var(--gold-light);
      font-style: italic;
    }

    .gold-line {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.4rem auto;
      border-radius: 2px;
    }

    .card-sub {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.03em;
      line-height: 1.7;
      max-width: 55ch;
      margin: 0 auto;
    }

    .gems {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 2rem;
    }

    .gem {
      width: 10px;
      height: 10px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      opacity: 0.7;
      animation: gemPulse 2.5s ease-in-out infinite;
    }
    .gem:nth-child(2) { animation-delay: 0.4s; width: 14px; height: 14px; opacity: 0.9; }
    .gem:nth-child(3) { animation-delay: 0.8s; }

    @keyframes gemPulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    .message-wrap {
      max-width: 760px;
      width: 100%;
      padding-top: 1rem;
      padding-bottom: 3rem;
    }

    .message-card {
      background: var(--crystal);
      border: 1px solid var(--crystal-border);
      border-top: 2px solid rgba(201,168,76,0.35);
      border-radius: 20px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: clamp(1.5rem, 4vw, 3rem) clamp(1.5rem, 4vw, 3rem);
      text-align: center;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.05);
      opacity: 0;
      clip-path: inset(30px 0 0 0 round 20px);
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), clip-path 0.9s cubic-bezier(0.16,1,0.3,1);
    }

    .message-card.revealed {
      opacity: 1;
      clip-path: inset(0px 0 0 0 round 20px);
    }

    .message-icon {
      font-size: 2.2rem;
      margin-bottom: 1rem;
      animation: heartBeat 1.4s ease-in-out infinite;
    }

    @keyframes heartBeat {
      0%,100% { transform: scale(1); }
      14%      { transform: scale(1.15); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.1); }
      70%      { transform: scale(1); }
    }

    .message-text {
      font-family: var(--font-display);
      font-style: italic;
      font-size: clamp(1.1rem, 3.5vw, 1.7rem);
      line-height: 1.55;
      color: var(--text-main);
    }

    .message-text em {
      color: var(--gold-light);
      font-style: normal;
      font-weight: 700;
    }

    .scroll-hint {
      position: fixed;
      bottom: 1.8rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      opacity: 0.5;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      z-index: 10;
      transition: opacity 0.4s;
    }

    .scroll-hint.hidden { opacity: 0; pointer-events: none; }

    .scroll-arrow {
      width: 20px;
      height: 20px;
      border-right: 1.5px solid var(--gold);
      border-bottom: 1.5px solid var(--gold);
      transform: rotate(45deg);
      animation: bounceArrow 1.5s ease-in-out infinite;
    }

    @keyframes bounceArrow {
      0%,100% { transform: rotate(45deg) translate(0,0); }
      50%      { transform: rotate(45deg) translate(4px,4px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .message-card { opacity:1; clip-path:none; transition:none; }
      .gem { animation: none; }
      .message-icon { animation: none; }
    }
  </style>
</head>
<body>

<canvas id="heart-canvas"></canvas>

<main class="page">
  <div class="card">
    <p class="card-label">A Special Moment</p>
    <h1 class="card-title">Congrats, <span>Graduates</span></h1>
    <div class="gold-line"></div>
    <p class="card-sub">Every late night, every challenge, every sacrifice — it all led here. This is your moment. Wear it with pride. 🎓</p>
    <div class="gems">
      <div class="gem"></div>
      <div class="gem"></div>
      <div class="gem"></div>
    </div>
  </div>

  <div class="message-wrap">
    <div class="message-card" id="msg">
      <div class="message-icon">💖</div>
      <p class="message-text">
        <em>Congratulations on officially graduating,</em><br>
        my favorite best team and persons I have ever met. 💖
      </p>
    </div>
  </div>
</main>

<div class="scroll-hint" id="scrollHint">
  <div class="scroll-arrow"></div>
  <span>scroll</span>
</div>

<script>
(function(){
  const canvas = document.getElementById('heart-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, hearts = [];

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function heartPath(ctx, x, y, size){
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(size, size);
    ctx.beginPath();
    ctx.moveTo(0, -0.3);
    ctx.bezierCurveTo( 0.5,-1,  1.2,-0.4,  0, 0.6);
    ctx.bezierCurveTo(-1.2,-0.4, -0.5,-1,  0, -0.3);
    ctx.closePath();
    ctx.restore();
  }

  function spawn(){
    const size = 6 + Math.random() * 18;
    const hue  = Math.random() < 0.6 ? '#c9a84c' : '#e06080';
    hearts.push({
      x:     Math.random() * W,
      y:     H + size * 2,
      vx:    (Math.random() - 0.5) * 0.6,
      vy:    -(1.2 + Math.random() * 2),
      size,
      alpha: 0.6 + Math.random() * 0.4,
      color: hue,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.02 + Math.random() * 0.02,
      scrollBias: 0,
    });
  }

  for(let i=0;i<22;i++){
    spawn();
    hearts[hearts.length-1].y = Math.random() * H;
  }

  let lastScroll = window.scrollY;
  let scrollDelta = 0;

  window.addEventListener('scroll', ()=>{
    const now = window.scrollY;
    scrollDelta = (now - lastScroll);
    lastScroll = now;
  });

  let frame = 0;
  function tick(){
    requestAnimationFrame(tick);
    ctx.clearRect(0,0,W,H);
    frame++;
    if(frame % 18 === 0) spawn();

    hearts.forEach(h => { h.scrollBias = scrollDelta * 0.3; });
    scrollDelta *= 0.85;

    for(let i = hearts.length - 1; i >= 0; i--){
      const h = hearts[i];
      h.wobble += h.wobbleSpeed;
      h.x  += h.vx + Math.sin(h.wobble) * 0.4;
      h.vy -= 0.005;
      h.y  += h.vy - h.scrollBias;
      h.alpha -= 0.003;

      if(h.alpha <= 0 || h.y < -h.size * 3){
        hearts.splice(i, 1);
        continue;
      }

      ctx.save();
      ctx.globalAlpha = h.alpha;
      ctx.fillStyle = h.color;
      ctx.shadowBlur = 8;
      ctx.shadowColor = h.color;
      heartPath(ctx, h.x, h.y, h.size);
      ctx.fill();
      ctx.restore();
    }
  }
  tick();
})();

(function(){
  const msg  = document.getElementById('msg');
  const hint = document.getElementById('scrollHint');

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting){ msg.classList.add('revealed'); obs.disconnect(); }
    });
  }, { threshold: 0.25 });
  obs.observe(msg);

  window.addEventListener('scroll', () => {
    if(window.scrollY > 80) hint.classList.add('hidden');
    else hint.classList.remove('hidden');
  }, { passive: true });
})();
</script>
</body>
</html>
